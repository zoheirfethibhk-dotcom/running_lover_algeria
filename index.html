    const CAT_META = {
      ROUTE:  { emoji: "🏁", label: "Route" },
      TRAIL:  { emoji: "⛰️", label: "Trail" },
      URBAN:  { emoji: "🌆", label: "Urbaine" },
      "DÉSERT": { emoji: "🏜️", label: "Désert" },
    };

    function daysLeft(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      return Math.ceil((d - now) / 86400000);
    }

    function fmt(dateStr) {
      return new Date(dateStr).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
    }

    function fmtLong(dateStr) {
      return new Date(dateStr).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    // ── CARD ──
    function Card({ race, onOpen }) {
      const [hov, setHov] = useState(false);
      const j = daysLeft(race.date);
      const past = j < 0;
      const soon = j >= 0 && j <= 30;
      const cat = CAT_META[race.categorie] || { emoji: "🏃", label: race.categorie };

      return (
        <div
          onClick={() => onOpen(race)}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            borderRadius: 18, overflow: "hidden", cursor: "pointer",
            background: "#fff", border: hov ? `2px solid ${race.accent}` : "2px solid #e8e4de",
            boxShadow: hov ? `0 24px 56px rgba(0,0,0,0.14)` : "0 2px 12px rgba(0,0,0,0.06)",
            transform: hov ? "translateY(-6px)" : "none",
            transition: "all 0.25s ease",
            opacity: past ? 0.55 : 1,
          }}
        >
          {/* Photo */}
          <div style={{ height: 200, overflow: "hidden", position: "relative" }}>
            <img src={race.photo} alt={race.nom}
              style={{ width: "100%", height: "100%", objectFit: "cover", display: "block",
                transform: hov ? "scale(1.07)" : "scale(1)", transition: "transform 0.45s ease",
                filter: past ? "grayscale(1)" : "none" }} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%)" }} />

            {/* Badge REPORTÉ */}
            {race.reporte && (
              <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ background: "#f59e0b", color: "#fff", fontWeight: 900, fontSize: 18, padding: "10px 24px", borderRadius: 12, letterSpacing: 2, transform: "rotate(-5deg)", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>
                  ⚠️ REPORTÉ
                </div>
              </div>
            )}

            {/* Catégorie badge */}
            <div style={{ position: "absolute", top: 12, left: 12, background: "rgba(255,255,255,0.95)", borderRadius: 8, padding: "4px 10px", display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 12 }}>{cat.emoji}</span>
              <span style={{ fontSize: 10, fontWeight: 800, color: "#111", letterSpacing: 1.5, textTransform: "uppercase" }}>{cat.label}</span>
            </div>

            {/* J- badge */}
            {!past && (
              <div style={{ position: "absolute", top: 12, right: 12, background: soon ? race.accent : "rgba(0,0,0,0.52)", backdropFilter: "blur(8px)", borderRadius: 10, padding: "5px 10px", textAlign: "center" }}>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{j === 0 ? "AUJ" : `J-${j}`}</div>

            {past && (

    }

    // ── MODAL ──
    function Modal({ race, onClose }) {
      const j = daysLeft(race.date);
      const cat = CAT_META[race.categorie] || { emoji: "🏃", label: race.categorie };

      useEffect(() => {
        document.body.style.overflow = "hidden";
        const fn = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", fn);
        return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", fn); };
      }, []);

      return (
        <div onClick={e => e.target === e.currentTarget && onClose()}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 9999, display: "flex", alignItems: "flex-end", justifyContent: "center", backdropFilter: "blur(6px)" }}>
          <div style={{ background: "#fff", borderRadius: "24px 24px 0 0", width: "100%", maxWidth: 600, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 -24px 80px rgba(0,0,0,0.22)" }}>

            {/* Hero */}
            <div style={{ height: 260, overflow: "hidden", position: "relative" }}>
              <img src={race.photo} alt={race.nom} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
              <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 55%)" }} />
              <button onClick={onClose} style={{ position: "absolute", top: 16, right: 16, background: "rgba(0,0,0,0.45)", border: "none", color: "#fff", fontSize: 22, width: 38, height: 38, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
              <div style={{ position: "absolute", top: 16, left: 16, background: "rgba(255,255,255,0.95)", borderRadius: 8, padding: "5px 12px", display: "flex", alignItems: "center", gap: 5 }}>
                <span>{cat.emoji}</span>
                <span style={{ fontSize: 11, fontWeight: 800, color: "#111", letterSpacing: 1.5, textTransform: "uppercase" }}>{cat.label}</span>
              </div>
              <div style={{ position: "absolute", bottom: 20, left: 22, right: 22 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: race.accent, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{race.edition}</div>
                <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 30, fontWeight: 700, color: "#fff", lineHeight: 1.1 }}>{race.nom}</h2>
              </div>
            </div>

            {/* Body */}
            <div style={{ padding: "24px 24px 48px", display: "flex", flexDirection: "column", gap: 22 }}>

              {/* Distances + J- */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {race.distances.map(d => (
                  <span key={d} style={{ fontSize: 13, fontWeight: 800, color: race.accent, background: race.accent + "14", border: `1.5px solid ${race.accent}30`, padding: "7px 15px", borderRadius: 99 }}>{d}</span>
                ))}
                {j > 0 && <span style={{ fontSize: 13, fontWeight: 700, color: "#888", background: "#f5f5f5", border: "1.5px solid #e5e5e5", padding: "7px 15px", borderRadius: 99 }}>J-{j}</span>}
              </div>

              {/* Infos */}
              <div style={{ border: "1px solid #eeebe6", borderRadius: 14, overflow: "hidden" }}>
                {[
                  { icon: "📅", label: "Date", val: fmtLong(race.date), sub: race.heure !== "À confirmer" ? `Heure de départ : ${race.heure}` : null },
                  { icon: "📍", label: "Lieu", val: race.ville, sub: race.wilaya },
                  { icon: "🗺️", label: "Parcours", val: race.parcours || race.region, sub: null },
                  { icon: "🏢", label: "Organisateur", val: race.organisateur, sub: null },
                ].map(({ icon, label, val, sub }, i, arr) => (
                  <div key={label} style={{ display: "flex", gap: 14, padding: "13px 16px", background: i % 2 === 0 ? "#fff" : "#fbf9f7", borderBottom: i < arr.length - 1 ? "1px solid #eeebe6" : "none" }}>
                    <span style={{ fontSize: 18, flexShrink: 0, opacity: 0.7 }}>{icon}</span>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#bbb", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#111" }}>{val}</div>
                      {sub && <div style={{ fontSize: 12, color: "#888", marginTop: 1 }}>{sub}</div>}
                    </div>
                  </div>
                ))}
              </div>

              {/* Inscription */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#bbb", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Inscription</div>
                {race.lien ? (
                  <a href={race.lien} target="_blank" rel="noopener noreferrer"
                    style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "16px", borderRadius: 14, background: race.accent, color: "#fff", fontWeight: 800, fontSize: 15, letterSpacing: 0.5, textDecoration: "none" }}>

                  </a>
                ) : (
                  <div style={{ background: "#f7f5f2", border: "1px solid #eeebe6", borderRadius: 14, padding: "16px 18px" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#333", marginBottom: 5 }}>Comment s'inscrire</div>
                    <div style={{ fontSize: 13, color: "#777", lineHeight: 1.7 }}>
                      Contactez : <strong style={{ color: "#333" }}>{race.contact}</strong><br />
                      <span style={{ color: "#aaa" }}>Suivez les réseaux sociaux du club ou de la wilaya concernée.</span>
                    </div>
                  </div>
                )}
              </div>

              {/* Réseaux sociaux */}
              {race.social && (
                <a href={race.social} target="_blank" rel="noopener noreferrer"
                  style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "13px", borderRadius: 12, background: "#f7f5f2", border: "1px solid #e5e0d8", color: "#333", fontWeight: 700, fontSize: 13, textDecoration: "none" }}>
                  📲 Suivre sur les réseaux sociaux
                </a>
              )}

              {/* Note médicale */}
              <div style={{ display: "flex", gap: 10, padding: "12px 14px", borderRadius: 12, background: "#fefce8", border: "1px solid #fde68a" }}>
                <span>📋</span>
                <p style={{ fontSize: 12, color: "#854d0e", lineHeight: 1.6 }}>
                  <strong>Rappel :</strong> Certificat médical de moins d'un an obligatoire pour toute compétition officielle en Algérie.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

                    securite: "⭐⭐⭐⭐⭐",
                    description: "Promenade le long de la Méditerranée avec vue panoramique sur la mer. Chemin pavé aménagé pour les coureurs, bien éclairé le soir. Parfait pour les runs nocturnes.",
                    photo: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80",
                    color: "#0891b2",
                  },
                  {
                    nom: "Bois des Pins",
                    ville: "Alger — El Madania",
                    type: "🌿 Parc nature",
                    niveau: "Tous niveaux",
                    distance: "Sentiers variés",
                    securite: "⭐⭐⭐⭐",
                    description: "Parc naturel avec sentiers sinueux à travers la forêt de pins. Environnement paisible, idéal pour courir en pleine nature au cœur d'Alger. Populaire en famille.",
                    photo: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80",
                    color: "#16a34a",
                  },
                  {
                    nom: "Corniche d'Alger",
                    ville: "Alger — Littoral Est",
                    type: "🌅 Route côtière",
                    niveau: "Tous niveaux",
                    distance: "~10 km",
                    securite: "⭐⭐⭐⭐",
                    description: "Route côtière panoramique longeant la Méditerranée de Alger vers Tamentfoust. Vue imprenable sur la mer, brise marine, bien éclairée la nuit. Attention à la circulation.",
                    photo: "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=600&q=80",
                    color: "#0ea5e9",
                  },
                  {
                    nom: "Jardin d'Essai du Hamma",
                    ville: "Alger — El Harrach",
                    type: "🌸 Jardin botanique",
                    niveau: "Débutant",
                    distance: "~3 km dans le parc",
                    securite: "⭐⭐⭐⭐⭐",
                    description: "Vaste parc botanique avec allées ombragées, étangs et espaces verts. Cadre naturel exceptionnel et paisible. Idéal pour les débutants et les runs de récupération.",
                    photo: "https://images.unsplash.com/photo-1585320806297-9794b3e4aaae?w=600&q=80",
                    color: "#65a30d",
                  },
                  {
                    nom: "Parc de la Liberté",
                    ville: "Alger — Belouizdad",
                    type: "🏙️ Parc urbain",
                    niveau: "Débutant",
                    distance: "~2 km",
                    securite: "⭐⭐⭐⭐",
                    description: "Parc urbain au cœur de Belcourt avec sentiers bien entretenus et zones ombragées. Idéal pour courir au cœur de la vie locale algéroise après le travail.",
                    photo: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=600&q=80",
                    color: "#7c3aed",
                  },
                  {
                    nom: "Parc National de Chréa",
                    ville: "Blida — Atlas Blidéen",
                    type: "⛰️ Montagne",
                    niveau: "Avancé",
                    distance: "Nombreux sentiers",
                    securite: "⭐⭐⭐⭐",
                    description: "Parc national dans les montagnes de l'Atlas Blidéen. Forêts de cèdres, air pur de montagne, sentiers balisés. Parfait pour les trails. Accessible en 1h d'Alger.",
                    photo: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80",
                    color: "#d97706",
                  },
                  {
                    nom: "Djurdjura — Tizi Ouzou",
                    ville: "Kabylie",
                    type: "🏔️ Haute montagne",
                    niveau: "Expert",
                    distance: "Trails variés",
                    securite: "⭐⭐⭐⭐",
                    description: "Massif montagneux de Kabylie, terrain du Trail Azro N'Thor. Forêts de chênes et cèdres, vues spectaculaires, sentiers techniques. Le paradis des traileurs algériens.",
                    photo: "https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=600&q=80",
                    color: "#16a34a",
                  },
                ].map((spot, i) => (
                  <div key={i} style={{ background: "#111", border: "1px solid #1f1f1f", borderRadius: 16, overflow: "hidden", transition: "border-color 0.2s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = spot.color}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "#1f1f1f"}>
                    {/* Photo */}
                    <div style={{ height: 160, overflow: "hidden", position: "relative" }}>
                      <img src={spot.photo} alt={spot.nom} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
                      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%)" }} />
                      <div style={{ position: "absolute", top: 10, left: 10, background: "rgba(0,0,0,0.6)", backdropFilter: "blur(6px)", borderRadius: 8, padding: "4px 10px", fontSize: 11, fontWeight: 700, color: "#fff" }}>{spot.type}</div>
                      <div style={{ position: "absolute", bottom: 10, left: 12 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: spot.color, letterSpacing: 1 }}>{spot.niveau}</div>
                      </div>
                    </div>
                    {/* Contenu */}
                    <div style={{ padding: "14px 16px 16px" }}>
                      <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 700, color: "#fff", marginBottom: 2 }}>{spot.nom}</div>
                      <div style={{ fontSize: 11, color: "#555", marginBottom: 10 }}>📍 {spot.ville}</div>
                      <p style={{ fontSize: 12, color: "#777", lineHeight: 1.7, marginBottom: 12 }}>{spot.description}</p>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: spot.color, fontWeight: 700 }}>🏃 {spot.distance}</span>
                        <span style={{ fontSize: 12 }}>{spot.securite}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Note sécurité */}
              <div style={{ marginTop: 28, padding: "14px 18px", borderRadius: 12, background: "#111", border: "1px solid #1f1f1f", display: "flex", gap: 12, alignItems: "flex-start" }}>
                <span style={{ fontSize: 20 }}>💡</span>
                <div style={{ fontSize: 12, color: "#555", lineHeight: 1.8 }}>
                  <strong style={{ color: "#888" }}>Conseils sécurité :</strong> Courez de préférence <strong style={{ color: "#666" }}>tôt le matin (6h-8h)</strong> ou <strong style={{ color: "#666" }}>en soirée (18h-20h)</strong>. Évitez les sorties solitaires la nuit. Courez en groupe autant que possible. Prévenez toujours quelqu'un de votre itinéraire. La forêt de Bouchaoui est l'endroit le plus sécurisé d'Alger grâce à la présence permanente des forces de l'ordre.
                </div>
              </div>
            </div>
          </div>

          {/* SECTION VIDÉOS */}
          <div style={{ padding: "40px 24px 0", maxWidth: 800, margin: "0 auto" }}>
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#dc2626", letterSpacing: 3, textTransform: "uppercase", marginBottom: 4 }}>◆ Vidéos</div>
              <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 28, fontWeight: 700, color: "#fff", margin: 0 }}>Running en Algérie</h2>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16 }}>
              {[
                { titre: "Algiers Urban Trail 2024 — Highlights", url: "https://www.youtube.com/results?search_query=Algiers+Urban+Trail+2024", thumb: "🎬", desc: "Revivez l'ambiance du trail urbain d'Alger à travers les ruelles de la Casbah.", duree: "5:32" },
                { titre: "Trail Azro N'Thor — Tirourda", url: "https://www.youtube.com/results?search_query=Trail+Azro+N%27Thor+Tirourda", thumb: "🏔️", desc: "Le trail de haute montagne dans le Djurdjura, un spectacle unique.", duree: "8:14" },
                { titre: "Sahara Marathon — Course de solidarité", url: "https://www.youtube.com/results?search_query=Sahara+Marathon+Tindouf", thumb: "🏜️", desc: "Le marathon du désert sahraoui dans les camps de Tindouf.", duree: "12:47" },
                { titre: "Semi-Marathon d'Alger — Édition internationale", url: "https://www.youtube.com/results?search_query=Semi+marathon+Alger", thumb: "🏁", desc: "Le départ depuis Bab El Oued jusqu'au front de mer d'Alger.", duree: "6:20" },
              ].map((v, i) => (
                <a key={i} href={v.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none", display: "block", background: "#111", border: "1px solid #1f1f1f", borderRadius: 14, overflow: "hidden", transition: "border-color 0.2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = "#dc2626"}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#1f1f1f"}>
                  <div style={{ background: "#1a1a1a", height: 120, display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>
                    <span style={{ fontSize: 48 }}>{v.thumb}</span>
                    <div style={{ position: "absolute", bottom: 8, right: 8, background: "rgba(220,38,38,0.9)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 6 }}>▶ {v.duree}</div>
                  </div>
                  <div style={{ padding: "12px 14px 14px" }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 6, lineHeight: 1.4 }}>{v.titre}</div>
                    <div style={{ fontSize: 11, color: "#555", lineHeight: 1.6 }}>{v.desc}</div>
                    <div style={{ marginTop: 8, fontSize: 11, color: "#dc2626", fontWeight: 600 }}>Voir sur YouTube →</div>
                  </div>
                </a>
              ))}
            </div>
          </div>

          {/* SECTION ARTICLES */}
          <div style={{ padding: "40px 24px 0", maxWidth: 800, margin: "0 auto" }}>
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "#dc2626", letterSpacing: 3, textTransform: "uppercase", marginBottom: 4 }}>◆ Articles</div>
              <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 28, fontWeight: 700, color: "#fff", margin: 0 }}>Actualités Running</h2>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {[
                { titre: "L'Algiers Urban Trail 2026 : Quand Alger devient terrain d'effort", date: "Janv. 2026", source: "ElWatan Sport", tag: "URBAN", url: "https://elwatan.com", couleur: "#dc2626" },
                { titre: "Trail Azro N'Thor 2026 : Parcours, inscriptions & résultats", date: "Mars 2026", source: "Finishers DZ", tag: "TRAIL", url: "https://finishers.com", couleur: "#16a34a" },
                { titre: "Le Sahara Marathon 2025 : Une traversée du désert algérien", date: "Mars 2025", source: "Sahara Marathon", tag: "DÉSERT", url: "https://saharamarathon.org", couleur: "#ea580c" },
                { titre: "Semi-Marathon de Béjaïa : Cap sur la Méditerranée", date: "Nov. 2025", source: "Liberté Sport", tag: "ROUTE", url: "https://liberte-algerie.com", couleur: "#2563eb" },
                { titre: "Running en Algérie : La discipline en plein essor", date: "Fév. 2026", source: "Le Soir d'Algérie", tag: "DOSSIER", url: "https://lesoirdalgerie.com", couleur: "#7c3aed" },
              ].map((a, i) => (
                <a key={i} href={a.url} target="_blank" rel="noopener noreferrer" style={{ textDecoration: "none", display: "flex", alignItems: "center", gap: 14, background: "#111", border: "1px solid #1f1f1f", borderRadius: 12, padding: "14px 16px", transition: "border-color 0.2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = a.couleur}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#1f1f1f"}>
                  <div style={{ flexShrink: 0, width: 4, height: 48, borderRadius: 4, background: a.couleur }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 10, fontWeight: 800, color: a.couleur, letterSpacing: 2 }}>{a.tag}</span>
                      <span style={{ fontSize: 10, color: "#333" }}>•</span>
                      <span style={{ fontSize: 10, color: "#444" }}>{a.source}</span>
                      <span style={{ fontSize: 10, color: "#333" }}>•</span>
                      <span style={{ fontSize: 10, color: "#444" }}>{a.date}</span>
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#ddd", lineHeight: 1.4 }}>{a.titre}</div>
                  </div>
                  <span style={{ color: "#333", fontSize: 16 }}>→</span>
                </a>
              ))}
            </div>
          </div>


          {/* FOOTER */}
          <footer style={{ background: "#0a0a0a", padding: "30px 24px", borderTop: "1px solid #141414", textAlign: "center" }}>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 700, color: "#fff" }}>
              Running <em style={{ color: "#dc2626" }}>Lover</em> <span style={{ fontSize: 13, color: "#444", fontStyle: "normal" }}>ALGERIA 🇩🇿</span>
            </div>
            <div style={{ fontSize: 11, color: "#333", marginTop: 4, letterSpacing: 1 }}>
              Calendrier des courses & trails · {RACES.length} événements · 2026
            </div>
          </footer>

          {detail && <Modal race={detail} onClose={() => setDetail(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
