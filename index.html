<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Lover Algeria 🇩🇿</title>
  <meta name="description" content="Calendrier des courses et trails algériens — dates, lieux et inscriptions." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f3ef; font-family: 'Outfit', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d9d5cc; border-radius: 99px; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-33.33%); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    a { text-decoration: none; }
    input { font-family: 'Outfit', sans-serif; }
    button { font-family: 'Outfit', sans-serif; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const RACES = [
      {
        id: 1,
        nom: "Semi-Marathon de Sétif",
        edition: "2ème Édition",
        distances: ["21 km"],
        categorie: "ROUTE",
        date: "2026-05-23",
        heure: "À confirmer",
        ville: "Sétif",
        wilaya: "Wilaya de Sétif",
        region: "Est",
        lien: null,
        contact: "Ligue d'Athlétisme de Sétif",
        organisateur: "US Tizi Nbishar · FAA · MJS",
        photo: "https://images.unsplash.com/photo-1530143311094-34d807799e8f?w=800&q=85",
        accent: "#16a34a",
      },
      {
        id: 2,
        nom: "Trail Miliana",

        date: "2026-05-23",

        ville: "Miliana",
        wilaya: "Wilaya d'Aïn Defla",
        region: "Nord",
        lien: null,

        organisateur: "Club local de Miliana",
        photo: "https://images.unsplash.com/photo-1551698618-1dfe5d97d256?w=800&q=85",
        accent: "#d97706",
      },
      {
        id: 3,
        nom: "Festival du Zaccar",
        edition: "Semi-marathon · Sport · Culture · Santé",

        categorie: "ROUTE",
        date: "2026-05-23",

        contact: "A.ASMA.RESP",
        organisateur: "A.ASMA.RESP · Min. Santé · Min. Sports · W. Djelfa",
        photo: "https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&q=85",
        accent: "#2563eb",
      },
      {
        id: 4,
        nom: "Trail Azro N'Thor",
        edition: "9ème Éd. · ITRA · by GIG Algeria",
        distances: ["42.6 km / 2300m D+", "23 km / 1340m D+"],
        categorie: "TRAIL",
        date: "2026-06-05",
        heure: "À confirmer",
        ville: "Aferdoun — Tizi Ouzou",
        wilaya: "Wilaya de Tizi Ouzou",
        region: "Kabylie",
        lien: null,
        contact: "GAYA Athletic Club",
        organisateur: "GAYA Athletic Club · GIG Algeria · FAA",
        photo: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=85",
        accent: "#16a34a",
      },
      {
        id: 5,
        nom: "AUT 26",
        edition: "Vivez Alger dans ses détails",
        distances: ["Distance à confirmer"],
        categorie: "URBAN",
        date: "2026-06-26",
        heure: "Nocturne",
        ville: "Alger",
        wilaya: "Wilaya d'Alger",
        region: "Nord",
        lien: null,
        contact: "AUT26 — Réseaux sociaux",
        organisateur: "AUT26",
        photo: "https://images.unsplash.com/photo-1538497547613-3671b50f6aef?w=800&q=85",
        accent: "#dc2626",
      },
      {
        id: 6,
        nom: "Semi-Marathon de Béjaïa",
        edition: "International · Côté Méditerranée",
        distances: ["21 km", "7 km", "3 km"],
        categorie: "ROUTE",
        date: "2026-11-06",
        heure: "À confirmer",
        ville: "Béjaïa",
        wilaya: "Wilaya de Béjaïa",
        region: "Kabylie",
        lien: "https://semimarathonbejaia.com",
        contact: "semimarathonbejaia.com",
        organisateur: "AMCB · Wilaya de Béjaïa",
        photo: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=85",
        accent: "#0891b2",
      },
      {
        id: 7,
        nom: "Semi-Marathon d'Alger",
        edition: "International · Alger la Blanche",
        distances: ["21 km", "10 km"],
        categorie: "ROUTE",
        date: "2026-11-14",
        heure: "À confirmer",
        ville: "Alger",
        wilaya: "Wilaya d'Alger",
        region: "Nord",
        lien: "https://laa.dz",
        contact: "laa.dz",
        organisateur: "FAA · DJS · Wilaya d'Alger",
        photo: "https://images.unsplash.com/photo-1502224562085-639556652f33?w=800&q=85",
        accent: "#16a34a",
      },
      {
        id: 8,
        nom: "Sahara Marathon",
        edition: "Solidarité · Désert · Tindouf",
        distances: ["42 km", "21 km", "10 km", "5 km"],
        categorie: "DÉSERT",
        date: "2027-02-20",
        heure: "À confirmer",
        ville: "Tindouf",
        wilaya: "Wilaya de Tindouf",
        region: "Sud",
        lien: "https://saharamarathon.org",
        contact: "saharamarathon.org",
        organisateur: "Organisation Sahara Marathon",
        photo: "https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=800&q=85",
        accent: "#ea580c",
      },
    ];

    const CAT_META = {
      ROUTE:  { emoji: "🏁", label: "Route" },
      TRAIL:  { emoji: "⛰️", label: "Trail" },
      URBAN:  { emoji: "🌆", label: "Urbaine" },
      "DÉSERT": { emoji: "🏜️", label: "Désert" },
    };

    function daysLeft(dateStr) {
      const d = new Date(dateStr);
      const now = new Date();
      return Math.ceil((d - now) / 86400000);
    }

    function fmt(dateStr) {
      return new Date(dateStr).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" });
    }

    function fmtLong(dateStr) {
      return new Date(dateStr).toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    // ── CARD ──
    function Card({ race, onOpen }) {
      const [hov, setHov] = useState(false);
      const j = daysLeft(race.date);
      const past = j < 0;
      const soon = j >= 0 && j <= 30;
      const cat = CAT_META[race.categorie] || { emoji: "🏃", label: race.categorie };

      return (
        <div
          onClick={() => onOpen(race)}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            borderRadius: 18, overflow: "hidden", cursor: "pointer",
            background: "#fff", border: hov ? `2px solid ${race.accent}` : "2px solid #e8e4de",
            boxShadow: hov ? `0 24px 56px rgba(0,0,0,0.14)` : "0 2px 12px rgba(0,0,0,0.06)",
            transform: hov ? "translateY(-6px)" : "none",
            transition: "all 0.25s ease",
            opacity: past ? 0.55 : 1,
          }}
        >
          {/* Photo */}
          <div style={{ height: 200, overflow: "hidden", position: "relative" }}>
            <img src={race.photo} alt={race.nom}
              style={{ width: "100%", height: "100%", objectFit: "cover", display: "block",
                transform: hov ? "scale(1.07)" : "scale(1)", transition: "transform 0.45s ease",
                filter: past ? "grayscale(1)" : "none" }} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 55%)" }} />

            {/* Catégorie badge */}
            <div style={{ position: "absolute", top: 12, left: 12, background: "rgba(255,255,255,0.95)", borderRadius: 8, padding: "4px 10px", display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ fontSize: 12 }}>{cat.emoji}</span>
              <span style={{ fontSize: 10, fontWeight: 800, color: "#111", letterSpacing: 1.5, textTransform: "uppercase" }}>{cat.label}</span>
            </div>

            {/* J- badge */}
            {!past && (
              <div style={{ position: "absolute", top: 12, right: 12, background: soon ? race.accent : "rgba(0,0,0,0.52)", backdropFilter: "blur(8px)", borderRadius: 10, padding: "5px 10px", textAlign: "center" }}>
                <div style={{ fontSize: 15, fontWeight: 900, color: "#fff", lineHeight: 1 }}>{j === 0 ? "AUJ" : `J-${j}`}</div>
              </div>
            )}
            {past && (
              <div style={{ position: "absolute", top: 12, right: 12, background: "rgba(0,0,0,0.5)", borderRadius: 8, padding: "4px 10px" }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: "#9ca3af" }}>PASSÉE</span>
              </div>
            )}

            {/* Distances */}
            <div style={{ position: "absolute", bottom: 12, left: 12, display: "flex", gap: 5, flexWrap: "wrap" }}>
              {race.distances.map(d => (
                <span key={d} style={{ background: "rgba(255,255,255,0.2)", backdropFilter: "blur(6px)", border: "1px solid rgba(255,255,255,0.4)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "3px 9px", borderRadius: 99 }}>{d}</span>
              ))}
            </div>
          </div>

          {/* Contenu */}
          <div style={{ padding: "16px 18px 18px" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: race.accent, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{race.edition}</div>
            <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 21, fontWeight: 700, color: "#0f0f0f", lineHeight: 1.15, letterSpacing: -0.3, marginBottom: 12 }}>{race.nom}</h3>

            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 14 }}>📅</span>
                <span style={{ fontSize: 13, color: "#333", fontWeight: 500 }}>{fmt(race.date)}{race.heure !== "À confirmer" ? ` · ${race.heure}` : ""}</span>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 14 }}>📍</span>
                <span style={{ fontSize: 13, color: "#333", fontWeight: 500 }}>{race.ville} <span style={{ color: "#aaa" }}>· {race.wilaya}</span></span>
              </div>
            </div>

            <div style={{ padding: "9px 13px", borderRadius: 10, background: race.lien ? race.accent + "18" : "#f7f5f2", border: `1px solid ${race.lien ? race.accent + "40" : "#e8e4de"}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: race.lien ? race.accent : "#999" }}>
                {race.lien ? `↗ Inscription : ${race.contact}` : `✉ ${race.contact}`}
              </span>
              <span style={{ fontSize: 16, color: race.lien ? race.accent : "#ccc" }}>›</span>
            </div>
          </div>
        </div>
      );
    }

    // ── MODAL ──
    function Modal({ race, onClose }) {
      const j = daysLeft(race.date);
      const cat = CAT_META[race.categorie] || { emoji: "🏃", label: race.categorie };

      useEffect(() => {
        document.body.style.overflow = "hidden";
        const fn = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", fn);
        return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", fn); };
      }, []);

      return (
        <div onClick={e => e.target === e.currentTarget && onClose()}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 9999, display: "flex", alignItems: "flex-end", justifyContent: "center", backdropFilter: "blur(6px)" }}>
          <div style={{ background: "#fff", borderRadius: "24px 24px 0 0", width: "100%", maxWidth: 600, maxHeight: "92vh", overflowY: "auto", boxShadow: "0 -24px 80px rgba(0,0,0,0.22)" }}>

            {/* Hero */}
            <div style={{ height: 260, overflow: "hidden", position: "relative" }}>
              <img src={race.photo} alt={race.nom} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
              <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 55%)" }} />
              <button onClick={onClose} style={{ position: "absolute", top: 16, right: 16, background: "rgba(0,0,0,0.45)", border: "none", color: "#fff", fontSize: 22, width: 38, height: 38, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
              <div style={{ position: "absolute", top: 16, left: 16, background: "rgba(255,255,255,0.95)", borderRadius: 8, padding: "5px 12px", display: "flex", alignItems: "center", gap: 5 }}>
                <span>{cat.emoji}</span>
                <span style={{ fontSize: 11, fontWeight: 800, color: "#111", letterSpacing: 1.5, textTransform: "uppercase" }}>{cat.label}</span>
              </div>
              <div style={{ position: "absolute", bottom: 20, left: 22, right: 22 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: race.accent, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{race.edition}</div>
                <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 30, fontWeight: 700, color: "#fff", lineHeight: 1.1 }}>{race.nom}</h2>
              </div>
            </div>

            {/* Body */}
            <div style={{ padding: "24px 24px 48px", display: "flex", flexDirection: "column", gap: 22 }}>

              {/* Distances + J- */}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {race.distances.map(d => (
                  <span key={d} style={{ fontSize: 13, fontWeight: 800, color: race.accent, background: race.accent + "14", border: `1.5px solid ${race.accent}30`, padding: "7px 15px", borderRadius: 99 }}>{d}</span>
                ))}
                {j > 0 && <span style={{ fontSize: 13, fontWeight: 700, color: "#888", background: "#f5f5f5", border: "1.5px solid #e5e5e5", padding: "7px 15px", borderRadius: 99 }}>J-{j}</span>}
              </div>

              {/* Infos */}
              <div style={{ border: "1px solid #eeebe6", borderRadius: 14, overflow: "hidden" }}>
                {[
                  { icon: "📅", label: "Date", val: fmtLong(race.date), sub: race.heure !== "À confirmer" ? `Heure de départ : ${race.heure}` : null },
                  { icon: "📍", label: "Lieu", val: race.ville, sub: race.wilaya },
                  { icon: "🗺️", label: "Région", val: race.region, sub: null },
                  { icon: "🏢", label: "Organisateur", val: race.organisateur, sub: null },
                ].map(({ icon, label, val, sub }, i, arr) => (
                  <div key={label} style={{ display: "flex", gap: 14, padding: "13px 16px", background: i % 2 === 0 ? "#fff" : "#fbf9f7", borderBottom: i < arr.length - 1 ? "1px solid #eeebe6" : "none" }}>
                    <span style={{ fontSize: 18, flexShrink: 0, opacity: 0.7 }}>{icon}</span>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#bbb", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#111" }}>{val}</div>
                      {sub && <div style={{ fontSize: 12, color: "#888", marginTop: 1 }}>{sub}</div>}
                    </div>
                  </div>
                ))}
              </div>

              {/* Inscription */}
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#bbb", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Inscription</div>
                {race.lien ? (
                  <a href={race.lien} target="_blank" rel="noopener noreferrer"
                    style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "16px", borderRadius: 14, background: race.accent, color: "#fff", fontWeight: 800, fontSize: 15, letterSpacing: 0.5, textDecoration: "none" }}>
                    S'inscrire en ligne ↗ &nbsp;<span style={{ opacity: 0.75, fontWeight: 400 }}>{race.contact}</span>
                  </a>
                ) : (
                  <div style={{ background: "#f7f5f2", border: "1px solid #eeebe6", borderRadius: 14, padding: "16px 18px" }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: "#333", marginBottom: 5 }}>Comment s'inscrire</div>
                    <div style={{ fontSize: 13, color: "#777", lineHeight: 1.7 }}>
                      Contactez : <strong style={{ color: "#333" }}>{race.contact}</strong><br />
                      <span style={{ color: "#aaa" }}>Suivez les réseaux sociaux du club ou de la wilaya concernée.</span>
                    </div>
                  </div>
                )}
              </div>

              {/* Note médicale */}
              <div style={{ display: "flex", gap: 10, padding: "12px 14px", borderRadius: 12, background: "#fefce8", border: "1px solid #fde68a" }}>
                <span>📋</span>
                <p style={{ fontSize: 12, color: "#854d0e", lineHeight: 1.6 }}>
                  <strong>Rappel :</strong> Certificat médical de moins d'un an obligatoire pour toute compétition officielle en Algérie.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── TICKER ──
    function Ticker() {
      const soon = RACES.filter(r => { const j = daysLeft(r.date); return j >= 0 && j <= 30; });
      if (soon.length === 0) return null;
      const items = [...soon, ...soon, ...soon];
      return (
        <div style={{ background: "#dc2626", overflow: "hidden", whiteSpace: "nowrap", padding: "8px 0" }}>
          <div style={{ display: "inline-flex", animation: "ticker 28s linear infinite" }}>
            {items.map((r, i) => (
              <span key={i} style={{ fontSize: 12, fontWeight: 700, color: "#fff", letterSpacing: 1, padding: "0 28px" }}>
                ◆ {r.nom.toUpperCase()} · {fmt(r.date)} · J-{daysLeft(r.date)}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ── APP ──
    function App() {
      const [detail, setDetail] = useState(null);
      const [cat, setCat] = useState("TOUT");
      const [search, setSearch] = useState("");

      const CATS = ["TOUT", "ROUTE", "TRAIL", "URBAN", "DÉSERT"];

      const filtered = RACES
        .filter(r => (cat === "TOUT" || r.categorie === cat) &&
          (r.nom.toLowerCase().includes(search.toLowerCase()) || r.ville.toLowerCase().includes(search.toLowerCase())))
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      const upcoming = filtered.filter(r => daysLeft(r.date) >= 0);
      const past = filtered.filter(r => daysLeft(r.date) < 0);

      return (
        <>
          {/* NAV */}
          <nav style={{ background: "#0a0a0a", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ maxWidth: 1020, margin: "0 auto", padding: "0 20px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 56, flexWrap: "wrap", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 30, height: 30, borderRadius: "50%", background: "#dc2626", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🏃</div>
                <div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 19, fontWeight: 700, color: "#fff", lineHeight: 1 }}>
                    Running <em style={{ color: "#dc2626" }}>Lover</em>
                  </div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: "#444", letterSpacing: 2.5, textTransform: "uppercase" }}>Algeria 🇩🇿</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                {CATS.map(c => (
                  <button key={c} onClick={() => setCat(c)}
                    style={{ padding: "5px 12px", borderRadius: 99, border: "none", background: cat === c ? "#dc2626" : "transparent", color: cat === c ? "#fff" : "#555", fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", transition: "all 0.15s" }}>
                    {c}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* TICKER */}
          <Ticker />

          {/* HERO */}
          <div style={{ background: "#0a0a0a", padding: "44px 24px 50px", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, bottom: 0, width: 4, background: "linear-gradient(to bottom, #16a34a 50%, #dc2626 50%)" }} />
            <div style={{ maxWidth: 1020, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 20, flexWrap: "wrap" }}>
                <div style={{ animation: "fadeUp 0.6s ease both" }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: "#dc2626", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>● Saison 2026</div>
                  <h1 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(42px, 7vw, 76px)", fontWeight: 700, color: "#fff", lineHeight: 0.92, letterSpacing: -2 }}>
                    Courez<br /><em style={{ color: "#dc2626" }}>l'Algérie</em>
                  </h1>
                  <p style={{ fontSize: 14, color: "#555", marginTop: 14, maxWidth: 320, lineHeight: 1.6 }}>
                    Calendrier des courses et trails — dates, lieux et inscriptions réunis.
                  </p>
                </div>
                <div style={{ display: "flex", gap: 0 }}>
                  {[["Routes", RACES.filter(r => r.categorie === "ROUTE").length, "#16a34a"], ["Trails", RACES.filter(r => r.categorie === "TRAIL").length, "#d97706"], ["Autres", RACES.filter(r => !["ROUTE","TRAIL"].includes(r.categorie)).length, "#dc2626"]].map(([label, n, color], i) => (
                    <div key={label} style={{ textAlign: "center", padding: "10px 20px", borderLeft: i > 0 ? "1px solid #1f1f1f" : "none" }}>
                      <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 40, fontWeight: 700, color, lineHeight: 1 }}>{n}</div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#444", letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>{label}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ marginTop: 26, maxWidth: 380 }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Rechercher une course ou ville…"
                  style={{ width: "100%", background: "#161616", border: "1px solid #2a2a2a", borderRadius: 12, padding: "11px 16px", fontSize: 13, color: "#eee", outline: "none" }}
                  onFocus={e => e.target.style.borderColor = "#dc2626"}
                  onBlur={e => e.target.style.borderColor = "#2a2a2a"} />
              </div>
            </div>
          </div>

          {/* GRILLE */}
          <main style={{ maxWidth: 1020, margin: "0 auto", padding: "34px 20px 60px" }}>
            {upcoming.length > 0 && (
              <section style={{ marginBottom: 48 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: "#dc2626", letterSpacing: 3, textTransform: "uppercase" }}>◆ À venir</span>
                  <div style={{ flex: 1, height: 1, background: "#e5e0d8" }} />
                  <span style={{ fontSize: 11, color: "#bbb" }}>{upcoming.length} courses</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(275px, 1fr))", gap: 18 }}>
                  {upcoming.map(r => <Card key={r.id} race={r} onOpen={setDetail} />)}
                </div>
              </section>
            )}
            {past.length > 0 && (
              <section>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
                  <span style={{ fontSize: 11, fontWeight: 800, color: "#bbb", letterSpacing: 3, textTransform: "uppercase" }}>◆ Courses passées</span>
                  <div style={{ flex: 1, height: 1, background: "#e5e0d8" }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(275px, 1fr))", gap: 18 }}>
                  {past.map(r => <Card key={r.id} race={r} onOpen={setDetail} />)}
                </div>
              </section>
            )}
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: "80px 0", fontFamily: "'Cormorant Garamond', serif", fontSize: 26, color: "#ccc", fontStyle: "italic" }}>Aucune course trouvée</div>
            )}
          </main>

          {/* FOOTER */}
          <footer style={{ background: "#0a0a0a", padding: "30px 24px", borderTop: "1px solid #141414", textAlign: "center" }}>
            <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 20, fontWeight: 700, color: "#fff" }}>
              Running <em style={{ color: "#dc2626" }}>Lover</em> <span style={{ fontSize: 13, color: "#444", fontStyle: "normal" }}>ALGERIA 🇩🇿</span>
            </div>
            <div style={{ fontSize: 11, color: "#333", marginTop: 4, letterSpacing: 1 }}>
              Calendrier des courses & trails · {RACES.length} événements · 2026
            </div>
          </footer>

          {detail && <Modal race={detail} onClose={() => setDetail(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
